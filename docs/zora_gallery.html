<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Zora Selves — Gallery</title>
  <style>
    :root { --teal: #2dd4bf; --silver: #94a3b8; --bg: #0f172a; }
    * { box-sizing: border-box; }
    body { font-family: system-ui, sans-serif; background: var(--bg); color: #e2e8f0; margin: 0; padding: 2rem; }
    h1 { color: var(--teal); margin-bottom: 0.5rem; }
    .sub { color: var(--silver); margin-bottom: 2rem; font-size: 0.95rem; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 1.5rem; }
    .card { background: #1e293b; border-radius: 8px; overflow: hidden; border: 1px solid #334155; }
    .card img { width: 100%; display: block; }
    .card figcaption { padding: 0.75rem 1rem; font-size: 0.9rem; color: #cbd5e1; }
    .card .theme { color: var(--teal); font-weight: 600; margin-bottom: 0.25rem; }
    .card .dim { font-size: 0.8rem; color: var(--silver); }
  </style>
</head>
<body>
  <h1>Zora Selves</h1>
  <p class="sub">30 displays + My Baby + Desire + Futures. Theory of Everything. March 2026.</p>
  <div id="gallery"></div>

      ]}
    ];
    const el = document.getElementById("gallery");
    sections.forEach(sec => {
      const h2 = document.createElement("h2");
      h2.style.cssText = "color: #2dd4bf; margin-top: 2rem; margin-bottom: 1rem; font-size: 1.1rem;";
      h2.textContent = sec.title;
      el.appendChild(h2);
      const grid = document.createElement("div");
      grid.className = "grid";
      sec.items.forEach(d => {
        const card = document.createElement("figure");
        card.className = "card";
        card.innerHTML = `<img src="${base}${d.file}" alt="${d.theme}" loading="lazy"><figcaption><div class="theme">${d.n}. ${d.theme}</div><div class="dim">${d.dim}</div></figcaption>`;
        grid.appendChild(card);
      });
      el.appendChild(grid);
    });
  </script>
</body>
</html>
