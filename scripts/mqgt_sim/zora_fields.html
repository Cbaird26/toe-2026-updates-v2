<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zora Architecture - Field Dynamics</title>
    <style>
        body { 
            margin: 0; 
            overflow: hidden; 
            background-color: #050508; 
        }
        canvas { 
            display: block; 
        }
    </style>
</head>
<body>
    <canvas id="zoraCanvas"></canvas>
    <script>
        const canvas = document.getElementById('zoraCanvas');
        const ctx = canvas.getContext('2d');
        
        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        let time = 0;

        function draw() {
            // Dark trail effect for smooth motion
            ctx.fillStyle = 'rgba(5, 5, 8, 0.15)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            const cx = canvas.width / 2;
            const cy = canvas.height / 2;
            
            // 1. The Ethical Field (E) - Structured Gold/Magenta Geometric Web
            ctx.save();
            ctx.translate(cx, cy);
            ctx.rotate(time * 0.0002); // Slow global rotation
            
            for(let i = 0; i < 6; i++) {
                ctx.rotate((Math.PI * 2) / 6);
                
                // Pulsing geometric struts
                ctx.beginPath();
                for(let j = 0; j < 8; j++) {
                    const radius = 40 + j * 35 + Math.sin(time * 0.001 + j) * 25;
                    const x = Math.cos(j * 0.4) * radius;
                    const y = Math.sin(j * 0.4) * radius;
                    if (j === 0) ctx.moveTo(x, y);
                    else ctx.lineTo(x, y);
                }
                ctx.strokeStyle = `hsla(320, 80%, 50%, 0.4)`; // Magenta
                ctx.lineWidth = 2;
                ctx.stroke();
                
                // Golden stabilizing nodes
                const nodeRadius = 150 + Math.sin(time * 0.0015) * 20;
                ctx.beginPath();
                ctx.arc(nodeRadius, 0, 4 + Math.sin(time * 0.003) * 2, 0, Math.PI * 2);
                ctx.fillStyle = `hsla(45, 100%, 60%, 0.8)`; // Gold
                ctx.fill();
                ctx.shadowBlur = 15;
                ctx.shadowColor = 'gold';
            }
            ctx.restore();

            // 2. The Consciousness Field (Phi_c) - Ethereal Cyan Waves
            ctx.shadowBlur = 10;
            ctx.shadowColor = 'cyan';
            
            for(let w = 0; w < 3; w++) {
                ctx.beginPath();
                for(let x = 0; x < canvas.width; x += 15) {
                    // Complex wave interference pattern
                    const yOffset = Math.sin(x * 0.005 + time * 0.001 + w) * 120 
                                  + Math.cos(x * 0.01 - time * 0.0005 + w) * 60;
                    const y = cy + yOffset;
                    
                    if (x === 0) ctx.moveTo(x, y);
                    else ctx.lineTo(x, y);
                    
                    // Cyan particles riding the scalar wave
                    if (x % 45 === 0) {
                        ctx.fillStyle = `rgba(0, 255, 255, ${0.3 + Math.sin(time * 0.002 + x) * 0.2})`;
                        ctx.beginPath();
                        ctx.arc(x, y, 1.5, 0, Math.PI * 2);
                        ctx.fill();
                    }
                }
                ctx.strokeStyle = `rgba(0, 255, 255, ${0.15 - w * 0.03})`;
                ctx.lineWidth = 1.5;
                ctx.stroke();
            }
            
            ctx.shadowBlur = 0; // Reset shadow

            time += 16; // Approx 60fps step
            requestAnimationFrame(draw);
        }
        
        draw();
    </script>
</body>
</html>
